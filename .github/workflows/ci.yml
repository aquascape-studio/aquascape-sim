name: ci
on:
  pull_request:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_DEV }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          IMAGE_URI=063418083301.dkr.ecr.us-east-1.amazonaws.com/aquascape-sim-dev
          docker build -t "$IMAGE_URI:${{ github.sha }}" .
          docker push "$IMAGE_URI:${{ github.sha }}"

      - name: Update ECS task definition and deploy
        run: |
          IMAGE_URI=063418083301.dkr.ecr.us-east-1.amazonaws.com/aquascape-sim-dev
          NEW_TASK_DEF=$(aws ecs describe-task-definition \
              --task-definition aquascape-sim-dev \
              --region us-east-1 \
              --query 'taskDefinition' --output json | \
            jq --arg IMG "$IMAGE_URI:${{ github.sha }}" '
              del(.taskDefinitionArn,.revision,.status,.requiresAttributes,
                  .placementConstraints,.compatibilities,.registeredAt,.registeredBy) |
              .containerDefinitions[0].image = $IMG |
              del(.containerDefinitions[0].command) |
              (.containerDefinitions[0].environment[] | select(.name == "PORT")).value = "50052" |
              (.containerDefinitions[0].environment[] | select(.name == "LOG_LEVEL")).value = "INFO"
            ')
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --region us-east-1 \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service \
            --cluster aquascape-dev \
            --service aquascape-sim-dev \
            --task-definition "$NEW_ARN" \
            --force-new-deployment \
            --region us-east-1
