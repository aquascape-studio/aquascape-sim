name: ci
on:
  pull_request:
  push:
    branches: [main]

# Shape-only CI for now. Real proto-gen + pytest is deferred until the
# proto submodule pinning + DDB wiring land.

jobs:
  shape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate pyproject.toml
        run: python -c "import tomllib; tomllib.load(open('pyproject.toml','rb'))"
      - name: Validate Dockerfile has a FROM line
        run: |
          if [ -f Dockerfile ]; then
            grep -qi '^FROM' Dockerfile
          fi
      - run: echo "shape ok — upgrade to real pytest once proto submodule + env are stable"
