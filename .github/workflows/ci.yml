name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  py:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch aquascape-proto
        run: git clone --depth 1 https://github.com/lixiangdapanji/aquascape-proto.git proto

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate protos
        run: python scripts/generate_proto.py

      - name: ruff
        run: ruff check .

      - name: mypy (algo core only, informational)
        continue-on-error: true
        run: mypy src/aquascape_sim/algo

      - name: test
        run: pytest -q

  docker:
    runs-on: ubuntu-latest
    needs: py
    steps:
      - uses: actions/checkout@v4
      - name: Fetch aquascape-proto
        run: git clone --depth 1 https://github.com/lixiangdapanji/aquascape-proto.git proto
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: aquascape-sim:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
